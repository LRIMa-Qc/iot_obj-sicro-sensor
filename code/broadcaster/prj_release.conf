#==============================================================================
# Release Configuration for Broadcaster
#==============================================================================
# This configuration disables logging and RTT, optimizes for size and power,
# and removes debug symbols for production deployment.
#
# Build: west build -b lrima_greenhouse_nrf52833 -- -DCONF_FILE="prj_release.conf"

# Disable logging
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_LOG_DEFAULT_LEVEL=1  # ERROR  (minimal overhead)
CONFIG_LOG_PRINTK=n

# Disable RTT to save memory and reduce power consumption
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n

# Disable debug symbols to reduce binary size
CONFIG_DEBUG_INFO=n
CONFIG_ASSERT=n

# Disable per-module debug logging
CONFIG_MAIN_LOG_LEVEL_INF=n
CONFIG_BUTTON_LOG_LEVEL_DBG=n
CONFIG_BLE_DRIVER_LOG_LEVEL_DBG=n
CONFIG_AHT20_LOG_LEVEL_WRN=n
CONFIG_SHT20_LOG_LEVEL_WRN=n
CONFIG_SHT31_LOG_LEVEL_WRN=n
CONFIG_SHT4X_LOG_LEVEL_WRN=n
CONFIG_STCC4_LOG_LEVEL_DBG=n
CONFIG_ADC_LOG_LEVEL_DBG=n
CONFIG_LED_LOG_LEVEL_WRN=n

# Disable Bluetooth stack logging
CONFIG_BT_LOG_LEVEL_OFF=y

# Lightweight C library (no float support in logging, not needed here)
CONFIG_PICOLIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=n

# Aggressive size optimization for deployment
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_DEBUG_OPTIMIZATIONS=y
