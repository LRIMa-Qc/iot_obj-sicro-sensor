# Pin MCUboot C library explicitly for NCS 3.2 migration clarity.
CONFIG_PICOLIBC=y

# MCUboot requires an active flash driver when device settings select FLASH_MAP.
CONFIG_FLASH=y
CONFIG_REBOOT=y

# Production hardening note: CONFIG_DISABLE_FLASH_PATCH depends on CONFIG_REBOOT,
# and MCUboot on this target resolves CONFIG_REBOOT=n in final Kconfig.
# Keep this file warning-free and track production hardening in release policy.
