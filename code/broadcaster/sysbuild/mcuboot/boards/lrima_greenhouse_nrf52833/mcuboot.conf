#==============================================================================
# MCUboot Configuration for lrima_greenhouse_nrf52833
#==============================================================================
# Board-specific MCUboot settings go here.
# These configurations apply to the MCUboot bootloader image only.
#
# Examples of MCUboot-specific overrides:
#   - CONFIG_MCUBOOT_LOG_LEVEL_<X> - Bootloader logging
#   - CONFIG_BOOT_MAX_IMG_SECTORS - Partition table adjustments
#   - CONFIG_MCUBOOT_WATCHDOG - Watchdog enable/disable
#
# Note: General application configuration belongs in prj.conf, not here.
# This file is isolated to prevent MCUboot from inheriting unintended
# application layer settings.

# Currently, all MCUboot defaults from the nRF SDK are sufficient.
# Add overrides below as needed for board-specific bootloader behavior.
