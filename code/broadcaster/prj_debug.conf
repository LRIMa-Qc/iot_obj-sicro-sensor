#==============================================================================
# Debug Configuration for Broadcaster
#==============================================================================
# This configuration enables comprehensive logging, RTT output, and debug symbols
# for ease of development and hardware bring-up.
#
# Build: west build -b lrima_greenhouse_nrf52833 -- -DCONF_FILE="prj_debug.conf"

# Enable logging at DEBUG level
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_LOG_PRINTK=y

# Enable console and Segger RTT output (no UART needed)
CONFIG_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y

# Enable runtime checks and debug-oriented settings
CONFIG_ASSERT=y

# Per-module debug logging
CONFIG_MAIN_LOG_LEVEL_DBG=y
CONFIG_BUTTON_LOG_LEVEL_DBG=n
CONFIG_BLE_DRIVER_LOG_LEVEL_DBG=y
CONFIG_APP_SETTINGS_LOG_LEVEL_DBG=y
CONFIG_AHT20_LOG_LEVEL_DBG=n
CONFIG_SHT20_LOG_LEVEL_DBG=n
CONFIG_SHT31_LOG_LEVEL_DBG=n
CONFIG_SHT4X_LOG_LEVEL_DBG=n
CONFIG_STCC4_LOG_LEVEL_DBG=n
CONFIG_ADC_LOG_LEVEL_DBG=n
CONFIG_LED_LOG_LEVEL_DBG=n

# Bluetooth stack debug logging
CONFIG_BT_LOG_LEVEL_INF=n

# Support for floating point in log output
CONFIG_PICOLIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Minimal size optimization (prioritize debug info)
CONFIG_SIZE_OPTIMIZATIONS=n
CONFIG_DEBUG_OPTIMIZATIONS=n
