#==============================================================================
# Build & Development Configuration
#==============================================================================
CONFIG_WARN_EXPERIMENTAL=y

#==============================================================================
# Basic Subsystem Configuration
#==============================================================================
CONFIG_PINCTRL=y
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

#==============================================================================
# Custom Configurations
#==============================================================================
# These settings are user-defined and can be adjusted for each device.

# Sensor and BLE Advertising Settings
CONFIG_SENSOR_SLEEP_DURATION_SEC=60
CONFIG_BLE_ADV_USE_CODED_PHY=n
CONFIG_BLE_ADV_DURATION_SEC=5
CONFIG_BLE_MIN_ADV_INTERVAL_MS=30
CONFIG_BLE_MAX_ADV_INTERVAL_MS=40
CONFIG_BLE_USER_DEFINED_NAME="LRIMa"
# Change this for each device
CONFIG_BLE_USER_DEFINED_MAC_ADDR="f0:ca:f0:ca:01:34"
# Change this for each device
CONFIG_BLE_NODE_ID=34

# Sensor Sleep Modification
CONFIG_SENSOR_SLEEP_MODIFICATION_ENABLED=y

#==============================================================================
# Logging Configuration
#==============================================================================
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n

# Default log level for all modules.
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_BT_LOG_LEVEL_OFF=y

# Logging Backends
CONFIG_MAIN_LOG_LEVEL_INF=y
CONFIG_AHT20_LOG_LEVEL_WRN=n
CONFIG_SHT20_LOG_LEVEL_WRN=n
CONFIG_SHT31_LOG_LEVEL_WRN=n
CONFIG_SHT4X_LOG_LEVEL_WRN=n
CONFIG_STCC4_LOG_LEVEL_DBG=y
CONFIG_ADC_LOG_LEVEL_DBG=n
CONFIG_BLE_DRIVER_LOG_LEVEL_DBG=n
CONFIG_APP_SETTINGS_LOG_LEVEL_DBG=n
CONFIG_BUTTON_LOG_LEVEL_DBG=n
CONFIG_LED_LOG_LEVEL_WRN=n

# Support for log
CONFIG_PICOLIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

#==============================================================================
# Bluetooth Configuration
#==============================================================================
CONFIG_BT=y
CONFIG_BT_CTLR_PHY_CODED=n
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_GATT_DM=n
CONFIG_BT_GATT_DYNAMIC_DB=n
CONFIG_BT_DEVICE_NAME_DYNAMIC=y

#==============================================================================
# Size Optimization and Multithreading
#==============================================================================
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_MULTITHREADING=y
CONFIG_REBOOT=y

#==============================================================================